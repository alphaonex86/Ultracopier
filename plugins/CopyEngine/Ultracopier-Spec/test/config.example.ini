# Ultracopier-Spec CopyEngine test configuration  (TEMPLATE -- committed, no secrets).
#
# Put your REAL config OUTSIDE the repo so private SOURCE paths can NEVER reach git:
#
#     ~/.config/ultracopier-spec-test.ini          (honors $XDG_CONFIG_HOME)
#
# i.e.   mkdir -p ~/.config
#        cp plugins/CopyEngine/Ultracopier-Spec/test/config.example.ini \
#           ~/.config/ultracopier-spec-test.ini
#        $EDITOR ~/.config/ultracopier-spec-test.ini
#
# The harness layers: this template (defaults) < ./config.ini (optional, gitignored)
# < ~/.config/ultracopier-spec-test.ini (wins). Keeping the real file in ~/.config
# means it is physically outside the source tree and cannot be committed by accident.
#
# If SOURCE* is empty the harness builds a synthetic source tree itself (files of
# many sizes, nested dirs, symlinks, a dangling symlink, unicode names, a 0-byte
# file, a >blockSize multi-chunk file). The synthetic tree leaks nothing and is what
# CI / `all.py` uses by default.

[paths]
# Real source folder to copy (optional). Empty -> harness-generated synthetic tree.
SOURCELINUX =
# Scratch destination root on Linux (wiped between cases). Must be on a disk with room.
DESTINATIONLINUX = /tmp/ultracopier-spec-test
# Real source folder on the Windows box (optional). Empty -> synthetic tree pushed to the box.
SOURCEWINDOWS =
# Scratch destination root on the Windows box (wiped between cases).
DESTINATIONWINDOWS = C:\cc-test\uc-auto

[windows]
# SSH target of the Windows 10 IOCP laptop. Empty host -> all IOCP cases are SKIPPED
# (Linux async/io_uring still run). The box must already have a matching ultracopier.exe
# deployment with its Qt6 DLLs (see ARCHITECTURE.md "Windows lane").
host =
# user@ip, e.g. ASUS@192.168.158.110
exe = C:\source\uc\ultracopier.exe

[binaries]
# Optional prebuilt binaries per backend. Empty -> the harness builds them on demand
# into build/test-<backend>/ (nodebug, so DebugModel does not inflate memory).
async =
io_uring =
# An AddressSanitizer build of the async backend (optional, for the `sanitize` memcheck).
async_asan =

[limits]
# Hard memory ceiling for every run (the copy is OOM-killed if it exceeds this).
mem_limit_mb = 1024
# After the copy completes the process must still be alive this long (proves it did not
# crash on teardown), then the harness kills it from OUTSIDE (never via a code change).
stay_alive_seconds = 10
# Max seconds to wait for a single copy to finish before declaring it hung.
copy_timeout_seconds = 1800
